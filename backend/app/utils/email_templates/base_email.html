<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px;
                     box-shadow: 0 2px 6px rgba(0,0,0,0.1); padding: 30px; }
        h1 { color: #2d89ef; font-size: 22px; text-align: center; }
        .otp-box { background: #f0f4ff; border: 2px dashed #2d89ef; padding: 15px;
                   text-align: center; font-size: 28px; font-weight: bold; color: #2d89ef;
                   margin: 20px 0; border-radius: 6px; }
        p { font-size: 15px; color: #333; line-height: 1.5; }
        .footer { font-size: 12px; color: #888; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
        <div class="footer">
            &copy; {{ year }} Secure Auth System. All rights reserved.
        </div>
    </div>
</body>
</html>
